services:
  - type: web
    name: docmind-rag-chatbot
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from chromadb.utils.embedding_functions import DefaultEmbeddingFunction; DefaultEmbeddingFunction()(['warmup'])"
    startCommand: streamlit run app/ui.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set this manually in the Render dashboard
      - key: VECTOR_STORE
        value: chroma
    plan: free
